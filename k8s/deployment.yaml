apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-demo-app
  namespace: demo
  labels: { app: vulnerable-demo-app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-demo-app }
  template:
    metadata:
      labels: { app: vulnerable-demo-app }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          # CI (gitops-bump) rewrites this line to the signed digest. Kyverno
          # verifies the signature + vuln attestation before the pod is admitted.
          image: 267083759123.dkr.ecr.us-east-1.amazonaws.com/vulnerable-demo-app@sha256:f6890035c7a40f7cdd7b9140b58dec00df716ebe03ace1717440f63d24143808
          ports: [{ containerPort: 3000 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5

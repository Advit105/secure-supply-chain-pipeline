# Grafana: reads Prometheus, renders the security dashboard. Datasource + dashboard are
# provisioned from ConfigMaps (generated by kustomize from the grafana/ tree) so there's no
# click-ops — apply the manifests and the dashboard is just there.
# ponytail: anonymous admin + no persistence. Fine for a local demo; set an admin password
# and a PVC for anything real.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: security-tools
  labels: { app: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_SECURITY_ALLOW_EMBEDDING, value: "true" }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
          resources:
            requests: { cpu: "100m", memory: 128Mi }
            limits: { cpu: "500m", memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboards
          configMap: { name: grafana-dashboards }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: security-tools
  labels: { app: grafana }
spec:
  selector: { app: grafana }
  ports:
    - { name: http, port: 3000, targetPort: http }

# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/description: >-
      Rejects any demo-app image that was not keyless-signed by our GitHub
      Actions pipeline identity. Unsigned or third-party images are denied.
spec:
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: check-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [demo]
      verifyImages:
        - imageReferences:
            # "*": the ns/demo match above is the trust boundary — EVERY image deployed there
            # must pass this policy. Scoping to a repo path instead would let an attacker
            # bypass the gate by simply naming their image something else.
            - "*"
          failureAction: Enforce # deny (not just audit) when verification fails; Audit to observe first
          mutateDigest: true # pin the tag to the verified digest on admission
          attestors:
            - entries:
                - keyless:
                    issuer: https://token.actions.githubusercontent.com
                    # Lock to your repo + workflow so only THIS pipeline can sign.
                    subject: "https://github.com/Advit105/secure-supply-chain-pipeline/.github/workflows/pipeline.yml@refs/heads/main"
                    rekor:
                      url: https://rekor.sigstore.dev
